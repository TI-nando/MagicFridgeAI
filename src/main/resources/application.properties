spring.application.name=MagicFridgeAI

# --- CONEXĂO COM O BANCO DE DADOS H2 ---
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:fridge_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent
gemini.api.key=${API_KEY}